services:
  uptime-kuma:
    image: louislam/uptime-kuma:latest
    container_name: uptime-kuma
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      - uptime-kuma:/app/data
    extra_hosts:
      - "media.home:192.168.1.130"
      - "jellyfin.home:192.168.1.130"
      - "immich.home:192.168.1.130"
      - "pihole.home:192.168.1.130"
    networks:
      - homelab

volumes:
  uptime-kuma:

networks:
  homelab:
    external: true
